name: Security and Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Run Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: 'go.mod'

      - name: Secret Scanning (Vaultify Tokens)
        run: |
          echo "Scanning diff for hardcoded Vaultify tokens (vt_)..."
          # Scans the diff for the string 'vt_' to prevent secrets from being committed.
          # git diff will output added lines starting with '+'. We grep for '^+.*vt_'.
          if git diff HEAD~1 HEAD | grep -E "^\+.*vt_"; then
            echo "::error::Vaultify token prefix 'vt_' found in the diff! Pipeline failed to prevent secret leak."
            exit 1
          else
            echo "No Vaultify tokens found in the diff. Code is clean."
          fi

  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      # - name: Run golangci-lint (Error:version stuck at Go 1.24!!)
      #   uses: golangci/golangci-lint-action@v6
      #   with:
      #     version: latest
      #     args: --timeout=5m
      
      - name: Compile golangci-lint from source
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        # go install places the binary in the GOPATH bin directory
        run: $(go env GOPATH)/bin/golangci-lint run --timeout=5m

      - name: Run Go Unit Tests
        run: go test ./... -race -v

  container-build:
    name: Container Build Test
    needs: [security-audit, code-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: vaultify:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
