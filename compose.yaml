services:
  postgres:
    image: postgres:17-alpine
    container_name: vaultify-db
    environment:
      # In production, these should be passed securely and not defaulted to these values
      POSTGRES_USER: ${POSTGRES_USER:-vaultify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vaultify_password}
      POSTGRES_DB: ${POSTGRES_DB:-vaultify}
    ports:
      - "5432:5432"
    volumes:
      - vaultify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaultify} -d ${POSTGRES_DB:-vaultify}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaultify-redis
    ports:
      - "6379:6379"
    volumes:
      - vaultify_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: vaultify-api
    ports:
      - "8080:8080"
    # Pulls secrets like MASTER_KEY and JWT_SECRET locally
    env_file:
      - .env
    environment:
      # Override the DB and Redis URLs to point to the local containers if not set in .env
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-vaultify}:${POSTGRES_PASSWORD:-vaultify_password}@postgres:5432/${POSTGRES_DB:-vaultify}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  vaultify_pgdata:
  vaultify_redisdata:
